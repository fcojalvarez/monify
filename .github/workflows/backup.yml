name: Supabase Database Backup

on:
  workflow_dispatch:

  schedule:
    # Todos los días a las 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  backup:
    runs-on: ubuntu-latest

    container:
      image: postgres:17

    steps:
      - name: Crear carpeta de backups
        run: mkdir -p backups

      - name: Exportar base de datos
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          FILE="backups/supabase-$(date +%Y-%m-%d_%H-%M-%S).sql"
          pg_dump \
            --no-owner \
            --no-privileges \
            --format=plain \
            "$DATABASE_URL" > "$FILE"

          gzip "$FILE"

      - name: Subir backup
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_number }}
          path: backups/*.gz
          retention-days: 30
