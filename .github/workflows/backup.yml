name: Supabase Database Backup

on:
  workflow_dispatch:

  schedule:
    - cron: '0 2 * * *'

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Crear carpeta de backups
        run: mkdir -p backups

      - name: Crear backup con PostgreSQL 17
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          docker run --rm \
            -v "$PWD/backups:/backups" \
            -e DATABASE_URL="$DATABASE_URL" \
            postgres:17 \
            bash -c '
              FILE="/backups/supabase-$(date +%Y-%m-%d_%H-%M-%S).sql"
              pg_dump \
                --no-owner \
                --no-privileges \
                --format=plain \
                "$DATABASE_URL" > "$FILE"
              gzip "$FILE"
            '

      - name: Verificar backup
        run: ls -lh backups

      - name: Subir backup
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_number }}
          path: backups/*.gz
          retention-days: 30
